<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>CredZo — Instant UPI Credit Line Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0C1E48;font-family:'Plus Jakarta Sans',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
#root{height:100%;display:flex;align-items:center;justify-content:center;min-height:100vh}
input{font-family:inherit}button{font-family:inherit}
@keyframes czBlink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes czSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes czPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.15;transform:scale(1.35)}}
@keyframes czSlideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes czSlideInRight{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}
@keyframes czSlideInLeft{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:translateX(0)}}
@keyframes czFadeIn{from{opacity:0}to{opacity:1}}
@keyframes czScanLine{0%{top:20%}50%{top:80%}100%{top:20%}}
@keyframes czProgressFill{from{width:0%}to{width:100%}}
@keyframes czSuccessPop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes czCountUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.screen-enter{animation:czSlideInRight .32s cubic-bezier(.22,1,.36,1) both}
.screen-enter-back{animation:czSlideInLeft .32s cubic-bezier(.22,1,.36,1) both}
.screen-fade{animation:czFadeIn .28s ease both}
.overlay-enter{animation:czSlideUp .36s cubic-bezier(.22,1,.36,1) both}
.scroll-hidden{scrollbar-width:none;-ms-overflow-style:none}
.scroll-hidden::-webkit-scrollbar{display:none}
.pressable{cursor:pointer;transition:transform .12s ease,opacity .12s ease;user-select:none}
.pressable:active{transform:scale(.97);opacity:.88}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

/* ─── Design Tokens ───────────────────────────────── */
const CZ = {
  navy:'#0C1E48',navyDark:'#091640',navyMid:'#1A4B9E',navyLight:'#EAF0FF',navyBorder:'#C0D0F0',
  teal:'#0891B2',tealDark:'#0E6E8C',tealSurface:'#E0F5FA',tealBorder:'#9FD8EA',
  bg:'#F2F5FC',card:'#FFFFFF',subtle:'#EBF0FA',border:'#DCE4F4',
  text:'#0E1C3C',textMd:'#3A5080',muted:'#8094BC',
  success:'#059669',successBg:'#ECFDF5',successBdr:'#6EE7B7',
  warning:'#D07A06',warningBg:'#FFFBEB',warningBdr:'#FCD34D',
  error:'#DC2B2B',errorBg:'#FEF2F2',errorBdr:'#FCA5A5',
  font:"'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif",
  heroGrad:'linear-gradient(160deg,#091640 0%,#0F2660 55%,#1B3F8A 100%)',
  aiGrad:'linear-gradient(135deg,#0EA5C9 0%,#1A4B9E 100%)',
  cardGrad:'linear-gradient(135deg,#0C1E48 0%,#1A3F8A 100%)',
  shadowSm:'0 1px 4px rgba(12,30,72,.08)',shadowMd:'0 2px 16px rgba(12,30,72,.1)',
  shadowBtn:'0 4px 22px rgba(12,30,72,.30)',
};
const SW=390,SH=844;

/* ─── Navigation ──────────────────────────────────── */
const NavCtx = React.createContext(null);
const SCREENS = {
  WELCOME:'welcome',SIGN_IN:'sign_in',SIGN_UP:'sign_up',OTP_VERIFY:'otp_verify',
  ELIGIBILITY:'eligibility',AADHAAR_OTP:'aadhaar_otp',PAN_CAPTURE:'pan_capture',
  PROCESSING:'processing',CREDIT_REVEAL:'credit_reveal',KFS_REVIEW:'kfs_review',
  CREDIT_DRAW:'credit_draw',DASHBOARD:'dashboard',
  PARTIAL:'partial',REJECTION:'rejection',AI_HELP:'ai_help',
};
function NavProvider({children}){
  const [cur,setCur]=React.useState(SCREENS.WELCOME);
  const [hist,setHist]=React.useState([]);
  const [dir,setDir]=React.useState('forward');
  const [overlay,setOverlay]=React.useState(null);
  const ORDER=[SCREENS.WELCOME,SCREENS.SIGN_IN,SCREENS.SIGN_UP,SCREENS.OTP_VERIFY,
    SCREENS.ELIGIBILITY,SCREENS.AADHAAR_OTP,SCREENS.PAN_CAPTURE,SCREENS.PROCESSING,
    SCREENS.CREDIT_REVEAL,SCREENS.KFS_REVIEW,SCREENS.CREDIT_DRAW,SCREENS.DASHBOARD,
    SCREENS.PARTIAL,SCREENS.REJECTION];
  const navigate=React.useCallback((s,opts={})=>{
    if(opts.overlay){setOverlay(s);return;}
    const fi=ORDER.indexOf(cur),ti=ORDER.indexOf(s);
    setDir(ti>=fi?'forward':'back');
    setHist(h=>[...h,cur]);setCur(s);
  },[cur]);
  const goBack=React.useCallback(()=>{
    if(overlay){setOverlay(null);return;}
    if(!hist.length)return;
    setDir('back');const p=hist[hist.length-1];
    setHist(h=>h.slice(0,-1));setCur(p);
  },[hist,overlay]);
  const dismissOverlay=React.useCallback(()=>setOverlay(null),[]);
  return <NavCtx.Provider value={{current:cur,navigate,goBack,overlay,dismissOverlay,dir}}>{children}</NavCtx.Provider>;
}
function useNav(){return React.useContext(NavCtx);}

/* ─── Base Components ─────────────────────────────── */
function Screen({children,style,bg,className}){
  return <div className={`scroll-hidden ${className||''}`} style={{width:SW,height:SH,background:bg||CZ.bg,fontFamily:CZ.font,display:'flex',flexDirection:'column',overflow:'hidden',position:'relative',WebkitFontSmoothing:'antialiased',...style}}>{children}</div>;
}
function StatusBar({dark}){
  const fg=dark?'rgba(255,255,255,.9)':CZ.text;
  return <div style={{height:44,flexShrink:0,display:'flex',alignItems:'center',padding:'0 22px'}}>
    <span style={{fontSize:15,fontWeight:700,color:fg,letterSpacing:-.3}}>9:41</span>
    <div style={{flex:1}}/>
    <div style={{display:'flex',alignItems:'center',gap:5}}>
      <svg width="17" height="12" viewBox="0 0 17 12" fill={fg}><rect x="0" y="8" width="3" height="4" rx=".7" opacity=".35"/><rect x="4.5" y="5.5" width="3" height="6.5" rx=".7" opacity=".6"/><rect x="9" y="2.5" width="3" height="9.5" rx=".7" opacity=".8"/><rect x="13.5" y="0" width="3" height="12" rx=".7"/></svg>
      <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x=".5" y="1" width="21" height="10" rx="3.2" stroke={fg} strokeOpacity=".4" strokeWidth="1"/><rect x="2" y="2.5" width="15" height="7" rx="2" fill={fg}/><path d="M22.5 4.5v3c1.2-.5 1.2-2.5 0-3z" fill={fg} opacity=".4"/></svg>
    </div>
  </div>;
}
function HomeIndicator({dark}){
  return <div style={{padding:'6px 0 10px',display:'flex',justifyContent:'center',flexShrink:0}}>
    <div style={{width:134,height:5,borderRadius:3,background:dark?'rgba(255,255,255,.28)':CZ.border}}/>
  </div>;
}
function Logo({dark,size='md'}){
  const s={sm:{box:28,icon:13,text:18},md:{box:36,icon:17,text:22},lg:{box:44,icon:21,text:28}}[size];
  return <div style={{display:'flex',alignItems:'center',gap:8}}>
    <div style={{width:s.box,height:s.box,borderRadius:Math.round(s.box*.28),background:dark?'rgba(255,255,255,.12)':CZ.aiGrad,border:`1px solid ${dark?'rgba(255,255,255,.2)':'transparent'}`,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
      <svg width={s.icon} height={s.icon} viewBox="0 0 18 18" fill="none"><path d="M4 4H14L4 14H14" stroke="white" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
    </div>
    <span style={{fontSize:s.text,fontWeight:800,color:dark?'white':CZ.navy,letterSpacing:-.5}}>CredZo</span>
  </div>;
}
function NavBar({step,total,title,dark,onBack,onHelp}){
  const fg=dark?'rgba(255,255,255,.9)':CZ.text,dim=dark?'rgba(255,255,255,.5)':CZ.muted;
  const Btn=({ch,onClick})=><div className="pressable" onClick={onClick} style={{width:40,height:40,borderRadius:'50%',background:dark?'rgba(255,255,255,.1)':CZ.card,border:`1px solid ${dark?'rgba(255,255,255,.15)':CZ.border}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,boxShadow:dark?'none':CZ.shadowSm}}>{ch}</div>;
  return <div style={{display:'flex',alignItems:'center',padding:'0 20px 12px',gap:8,flexShrink:0}}>
    <Btn onClick={onBack} ch={<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M11.5 4.5L7 9L11.5 13.5" stroke={fg} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}/>
    <div style={{flex:1,display:'flex',justifyContent:'center'}}>
      {step?<div style={{background:dark?'rgba(255,255,255,.1)':CZ.navyLight,border:`1px solid ${dark?'rgba(255,255,255,.12)':CZ.navyBorder}`,borderRadius:20,padding:'5px 16px',fontSize:13,fontWeight:600,color:dark?'rgba(255,255,255,.85)':CZ.navyMid}}>Step {step} of {total}</div>
      :title?<span style={{fontSize:16,fontWeight:700,color:fg}}>{title}</span>:null}
    </div>
    <Btn onClick={onHelp} ch={<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke={dim} strokeWidth="1.5"/><path d="M7.2 7c0-1 .8-1.8 1.8-1.8s1.8.8 1.8 1.8c0 .9-.8 1.5-1.8 1.8v.6" stroke={dim} strokeWidth="1.5" strokeLinecap="round"/><circle cx="9" cy="13" r=".8" fill={dim}/></svg>}/>
  </div>;
}
function Stepper({active}){
  const steps=['Eligibility','Verify ID','Your Limit'];
  return <div style={{display:'flex',alignItems:'flex-start',padding:'0 28px 16px',flexShrink:0}}>
    {steps.map((s,i)=>{const n=i+1,done=n<active,curr=n===active,future=n>active;return(
      <React.Fragment key={s}>
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
          <div style={{width:28,height:28,borderRadius:'50%',background:done?CZ.success:curr?CZ.navy:'transparent',border:`2px solid ${future?CZ.border:done?CZ.success:CZ.navy}`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:curr?`0 0 0 4px ${CZ.navyLight}`:'none',transition:'all .3s'}}>
            {done?<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
            :curr?<div style={{width:8,height:8,borderRadius:'50%',background:'white'}}/>:null}
          </div>
          <span style={{fontSize:11,fontWeight:(done||curr)?600:400,color:future?CZ.muted:done?CZ.success:CZ.navy,whiteSpace:'nowrap'}}>{s}</span>
        </div>
        {i<2&&<div style={{flex:1,height:2,background:n<active?CZ.success:CZ.border,marginBottom:22,margin:'13px 4px 0',borderRadius:1,transition:'background .4s'}}/>}
      </React.Fragment>
    );})}
  </div>;
}
function AICard({message,link,style}){
  return <div style={{margin:'0 20px',background:CZ.tealSurface,borderRadius:16,padding:14,display:'flex',gap:12,alignItems:'flex-start',border:`1px solid ${CZ.tealBorder}`,flexShrink:0,boxShadow:'0 2px 10px rgba(8,145,178,.08)',...style}}>
    <div style={{width:36,height:36,borderRadius:'50%',background:CZ.aiGrad,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 2px 10px rgba(8,145,178,.32)',border:'2px solid rgba(255,255,255,.5)'}}>
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1.5L8.7 5.5H13L9.6 7.9L10.8 12L7 9.6L3.2 12L4.4 7.9L1 5.5H5.3L7 1.5Z" fill="white" opacity=".95"/></svg>
    </div>
    <div style={{flex:1}}>
      <div style={{fontSize:10.5,fontWeight:700,color:CZ.teal,letterSpacing:.6,marginBottom:4,textTransform:'uppercase'}}>CredZo AI</div>
      <p style={{margin:0,fontSize:13.5,color:'#0C3540',lineHeight:1.6}}>{message}</p>
      {link&&<div style={{marginTop:8}}><span style={{fontSize:13,color:CZ.teal,fontWeight:700,cursor:'pointer'}}>{link} →</span></div>}
    </div>
  </div>;
}
function AIBubble({message,style}){
  return <div style={{margin:'0 20px',background:CZ.tealSurface,borderRadius:24,padding:'9px 14px',display:'flex',gap:10,alignItems:'center',border:`1px solid ${CZ.tealBorder}`,flexShrink:0,...style}}>
    <div style={{width:26,height:26,borderRadius:'50%',background:CZ.aiGrad,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1L6.8 4.3H10.5L7.6 6.3L8.6 9.7L5.5 7.7L2.4 9.7L3.4 6.3L.5 4.3H4.2L5.5 1Z" fill="white"/></svg>
    </div>
    <span style={{fontSize:12.5,color:'#0C3540',lineHeight:1.45}}>{message}</span>
  </div>;
}
function Button({label,disabled,variant,onClick,style,loading}){
  const [p,setP]=React.useState(false);
  const isPrimary=!variant||variant==='primary',isOutline=variant==='outline';
  return <button onClick={!disabled&&!loading?onClick:undefined} onMouseDown={()=>!disabled&&setP(true)} onMouseUp={()=>setP(false)} onMouseLeave={()=>setP(false)} onTouchStart={()=>!disabled&&setP(true)} onTouchEnd={()=>setP(false)} disabled={disabled} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,width:'100%',height:56,background:disabled?'#E2E8F5':isPrimary?CZ.navy:'transparent',color:disabled?CZ.muted:isPrimary?'white':CZ.navy,border:isOutline?`2px solid ${CZ.navy}`:'none',borderRadius:28,fontSize:16,fontFamily:CZ.font,fontWeight:700,cursor:disabled||loading?'not-allowed':'pointer',boxShadow:(!disabled&&isPrimary)?CZ.shadowBtn:'none',transition:'transform .12s,opacity .12s',transform:p&&!disabled?'scale(.97)':'scale(1)',opacity:p&&!disabled?.9:1,...style}}>
    {loading?<div style={{width:20,height:20,borderRadius:'50%',border:'2px solid white',borderTopColor:'transparent',animation:'czSpin .8s linear infinite'}}/>:label}
  </button>;
}
function Input({label,placeholder,value,onChange,type='text',prefix,suffix,error,hint,style}){
  const [focused,setFocused]=React.useState(false);
  return <div style={style}>
    {label&&<div style={{fontSize:13,fontWeight:600,color:CZ.textMd,marginBottom:6}}>{label}</div>}
    <div style={{display:'flex',alignItems:'center',background:CZ.card,border:`1.5px solid ${error?CZ.errorBdr:focused?CZ.navyMid:CZ.border}`,borderRadius:14,padding:'0 16px',height:52,gap:10,boxShadow:focused?`0 0 0 3px ${CZ.navyLight}`:CZ.shadowSm,transition:'border-color .18s,box-shadow .18s'}}>
      {prefix&&<><span style={{fontSize:14,fontWeight:600,color:CZ.textMd,flexShrink:0}}>{prefix}</span><div style={{width:1,height:20,background:CZ.border,flexShrink:0}}/></>}
      <input type={type} value={value||''} onChange={e=>onChange?.(e.target.value)} onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)} placeholder={placeholder} style={{flex:1,fontSize:15,color:CZ.text,fontFamily:CZ.font,background:'transparent',border:'none',outline:'none',padding:0}}/>
      {suffix&&<span style={{fontSize:18,color:CZ.muted,flexShrink:0,cursor:'pointer'}}>{suffix}</span>}
    </div>
    {hint&&!error&&<div style={{fontSize:12,color:CZ.muted,marginTop:5}}>{hint}</div>}
    {error&&<div style={{fontSize:12,color:CZ.error,marginTop:5}}>{error}</div>}
  </div>;
}
function OTPBoxes({value='',onChange,total=6}){
  const refs=React.useRef([]);
  React.useEffect(()=>{refs.current[Math.min(value.length,total-1)]?.focus();},[]);
  const onKD=(e,i)=>{if(e.key==='Backspace'){if(value[i]){onChange?.(value.slice(0,i)+value.slice(i+1));}else if(i>0){refs.current[i-1]?.focus();onChange?.(value.slice(0,i-1)+value.slice(i));}}};
  const onCh=(e,i)=>{const ch=e.target.value.replace(/\D/g,'').slice(-1);if(!ch)return;const arr=value.split('');arr[i]=ch;onChange?.(arr.slice(0,total).join(''));if(i<total-1)refs.current[i+1]?.focus();};
  const onPaste=(e)=>{e.preventDefault();const p=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,total);onChange?.(p);refs.current[Math.min(p.length,total-1)]?.focus();};
  return <div style={{display:'flex',gap:8,justifyContent:'center'}}>
    {Array.from({length:total}).map((_,i)=>{
      const filled=i<value.length,active=i===value.length&&i<total;
      return <div key={i} style={{position:'relative'}}>
        <input ref={el=>refs.current[i]=el} type="tel" inputMode="numeric" maxLength={1} value={value[i]||''} onChange={e=>onCh(e,i)} onKeyDown={e=>onKD(e,i)} onPaste={onPaste} style={{width:46,height:56,borderRadius:12,border:`2px solid ${active?CZ.navy:filled?CZ.navyMid:CZ.border}`,background:(active||filled)?CZ.navyLight:CZ.card,fontSize:22,color:CZ.navy,fontWeight:700,textAlign:'center',fontFamily:CZ.font,outline:'none',cursor:'pointer',boxShadow:active?`0 0 0 4px ${CZ.navyLight}`:'none',transition:'border-color .15s,box-shadow .15s',caretColor:'transparent'}}/>
        {active&&!value[i]&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',width:2,height:22,background:CZ.navy,borderRadius:1,animation:'czBlink 1s step-end infinite',pointerEvents:'none'}}/>}
      </div>;
    })}
  </div>;
}
function ProgressRing({pct,size=88,color,trackColor}){
  const sw=6,r=size/2-sw,circ=2*Math.PI*r;
  return <svg width={size} height={size} style={{display:'block'}}>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor||CZ.border} strokeWidth={sw}/>
    <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||CZ.navy} strokeWidth={sw} strokeDasharray={circ} strokeDashoffset={circ*(1-Math.min(pct,1))} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:'stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)'}}/>
  </svg>;
}
function TabBar({active=0,onTab}){
  const tabs=[{label:'Dashboard',icon:(a)=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect x="2" y="2" width="8.5" height="8.5" rx="2.5" fill={a?CZ.navy:CZ.muted} opacity={a?1:.45}/><rect x="11.5" y="2" width="8.5" height="8.5" rx="2.5" fill={a?CZ.navy:CZ.muted} opacity={a?.45:.25}/><rect x="2" y="11.5" width="8.5" height="8.5" rx="2.5" fill={a?CZ.navy:CZ.muted} opacity={a?.45:.25}/><rect x="11.5" y="11.5" width="8.5" height="8.5" rx="2.5" fill={a?CZ.navy:CZ.muted} opacity={a?1:.45}/></svg>},{label:'History',icon:(a)=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="8" stroke={a?CZ.navy:CZ.muted} strokeWidth="1.6" opacity={a?1:.5}/><path d="M11 7v4.4L13.8 13" stroke={a?CZ.navy:CZ.muted} strokeWidth="1.6" strokeLinecap="round" opacity={a?1:.5}/></svg>},{label:'Offers',icon:(a)=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2.5l2.2 5.5H19l-4.5 3.2 1.8 5.5L11 13.8 5.7 16.7l1.8-5.5L3 8l5.8-.1z" fill={a?CZ.navy:'none'} stroke={a?CZ.navy:CZ.muted} strokeWidth="1.5" strokeLinejoin="round" opacity={a?1:.5}/></svg>},{label:'Profile',icon:(a)=><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="11" cy="8" r="4" stroke={a?CZ.navy:CZ.muted} strokeWidth="1.6" opacity={a?1:.5}/><path d="M3 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke={a?CZ.navy:CZ.muted} strokeWidth="1.6" strokeLinecap="round" opacity={a?1:.5}/></svg>}];
  return <div style={{display:'flex',background:CZ.card,borderTop:`1px solid ${CZ.border}`,flexShrink:0}}>

      {t.icon(i===active)}<span style={{fontSize:10.5,fontWeight:i===active?700:400,color:i===active?CZ.navy:CZ.muted}}>{t.label}</span>
    </div>)}
  </div>;
}
function Card({children,style}){
  return <div style={{background:CZ.card,borderRadius:20,border:`1px solid ${CZ.border}`,boxShadow:CZ.shadowMd,...style}}>{children}</div>;
}
function TrustPill({children,variant}){
  const ok=variant==='success';
  return <div style={{display:'inline-flex',alignItems:'center',padding:'6px 12px',borderRadius:24,background:ok?CZ.successBg:CZ.card,border:`1px solid ${ok?CZ.successBdr:CZ.border}`,fontSize:12,fontWeight:ok?600:500,color:ok?CZ.success:CZ.textMd,whiteSpace:'nowrap'}}>{children}</div>;
}
function Divider({label}){

/* ─── App Router ──────────────────────────────────── */
function Router(){
  const {current,overlay,dir}=useNav();
  const ac=dir==='back'?'screen-enter-back':'screen-enter';
  const render=()=>{switch(current){
    case SCREENS.WELCOME:return<WelcomeScreen key={current}/>;
    case SCREENS.SIGN_IN:return<SignInScreen key={current}/>;
    case SCREENS.SIGN_UP:return<SignUpScreen key={current}/>;
    case SCREENS.OTP_VERIFY:return<OTPVerifyScreen key={current}/>;
    case SCREENS.ELIGIBILITY:return<EligibilityScreen key={current}/>;
    case SCREENS.AADHAAR_OTP:return<AadhaarOTPScreen key={current}/>;
    case SCREENS.PAN_CAPTURE:return<PANCaptureScreen key={current}/>;
    case SCREENS.PROCESSING:return<ProcessingScreen key={current}/>;
    case SCREENS.CREDIT_REVEAL:return<CreditRevealScreen key={current}/>;
    case SCREENS.KFS_REVIEW:return<KFSScreen key={current}/>;
    case SCREENS.CREDIT_DRAW:return<CreditDrawScreen key={current}/>;
    case SCREENS.DASHBOARD:return<DashboardScreen key={current}/>;
    case SCREENS.PARTIAL:return<PartialScreen key={current}/>;
    case SCREENS.REJECTION:return<RejectionScreen key={current}/>;
    default:return<WelcomeScreen key="fb"/>;
  }};
  return(
    <div style={{position:'relative',width:SW,height:SH}}>
      {render()}
      {overlay===SCREENS.AI_HELP&&<div style={{position:'absolute',inset:0,zIndex:50}}><AIHelp/></div>}
    </div>
  );
}
